name = "erc8128-site"
main = "src/worker.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "./dist"

[[routes]]
pattern = "erc8128.org"
custom_domain = true

[vars]
ERC8128_STORAGE_DEFAULT = "none"
# ERC8128_ENABLE_REDIS = "false"
# ERC8128_ENABLE_POSTGRES = "false"

# Secrets (set via `wrangler secret put`):
# SECRET_ALCHEMY_KEY
# REDIS_URL
# DATABASE_URL

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = false